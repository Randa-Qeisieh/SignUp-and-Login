<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script src="script.js"></script>
    <script src="../auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header>
        <nav>
            <a href="../home/home.html" class="logo">
                <div class="logo-avatar">
                    <img src="../assets/images/thoughtroam_icon_dark.png" alt="Blog Logo" class="header-logo"/>
                </div>
            </a>
            <ul class="nav-list">
                <li><a href="../home/home.html">Home</a></li>
                <li><a href="../contactus.html">Contact Us</a></li>
                <li><a href="../create-blog/create.html">Create Blog</a></li>
            </ul>
            <a href="../profile.html" class="header-profile">
                <div class="header-avatar"></div>
            </a>
        </nav>
    </header>
    <main>
        <section class="contact-main">
            <div class="contact-container">
                <div class="contact-info">
                    <h2>Contact Us</h2>
                    <p>If you have any questions, suggestions, or just want to say hello, feel free to reach out to us!</p>
                    <div class="emailus">
                        <span class="label">Email Us :</span>
                        <a href="mailto:randak832@gmail.com">randak832@gmail.com</a>
                    </div>
                    <div class="callus">
                        <span class="label">Call Us :</span>
                        <a href="tel:+962786120789">+962 7 8612 0789</a>
                    </div>
                    <div class="location">
                        <span class="label">Visit Us :</span>
                        <a href="https://maps.app.goo.gl/EQ2ieSMsW4g84tNi6" target="_blank">Amman, Jordan</a>
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3381.897296391956!2d35.736596680251814!3d32.04497125396073!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x151cbd53390ff93d%3A0x5f9be027e4a5aa5!2sQ.%20Rania%20St.%2C%20As-Salt!5e0!3m2!1sen!2sjo!4v1773818684077!5m2!1sen!2sjo" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
                <div class="contacts-form">
                <form class="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">

                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject">

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <button type="submit" onclick="sendMail()">Send message</button>
                </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 
            <script>document.write(new Date().getFullYear());</script> 
            Blog. All rights reserved.</p>
    </footer>
</body>
</html>
