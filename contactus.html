    <main>
        <section class="contact-main">
            <div class="contact-container">
                <div class="contact-info">
                    <h2>Contact Us</h2>
                    <p>If you have any questions, suggestions, or just want to say hello, feel free to reach out to us!</p>
                    <p><a href="mailto:radnak832@gmail.com">Send Us an Email Today!</a></p>
                    <p><a href="tel:+962786120789">Call Us Today!</a></p> 
                    <p><a href="https://maps.app.goo.gl/EQ2ieSMsW4g84tNi6" target="_blank">Address: Amman, Jordan</a></p> 
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3381.897296391956!2d35.736596680251814!3d32.04497125396073!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x151cbd53390ff93d%3A0x5f9be027e4a5aa5!2sQ.%20Rania%20St.%2C%20As-Salt!5e0!3m2!1sen!2sjo!4v1773818684077!5m2!1sen!2sjo" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <form class="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">

                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject">

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <button type="submit">Send message</button>
                </form>
            </div>
        </section>
    </main>
