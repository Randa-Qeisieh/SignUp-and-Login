<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script src="script.js"></script>
</head>
<body>
    <header>
        <nav>
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
            </ul>
            <a href="profile.html" class="header-profile">
                <div class="header-avatar"></div>
            </a>
        </nav>
    </header>
    <main>
        <section class="contact-main">
            <div class="contact-container">
                <div class="contact-info">
                    <h2>Contact Us</h2>
                    <p>If you have any questions, suggestions, or just want to say hello, feel free to reach out to us!</p>
                    <p>Email: support@blog.com</p>
                    <p>Phone: +962 7 8612 0789</p> 
                    <p>Address: Amman, Jordan</p>
                </div>
                <form class="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">

                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject">

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <button type="submit">Send message</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Blog. All rights reserved.</p>
    </footer>
</body>
</html>
