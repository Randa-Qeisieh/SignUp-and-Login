<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="icon" type="image/png" href="../assets/images/thoughtroam_icon_dark.png"/>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="../home/home.html" class="logo">
                <div class="logo-avatar">
                    <img src="../assets/images/thoughtroam_icon_dark.png" alt="Blog Logo" class="header-logo"/>
                </div>
            </a>
            <ul class="nav-list">
                <li><a href="../home/home.html">Home</a></li>
                <li><a href="../contactus.html">Contact Us</a></li>
            </ul>
            <a href="../profile.html" class="header-profile">
                <div class="header-avatar"></div>
            </a>
        </nav>
    </header>
    <div class="split-container">
    <div class="form-container">
        <form>
        <label for="name">Username</label><br />
        <input type="text" id="name" name="name" />

        <label for="email">Email</label><br />
        <input type="email" id="email" name="email" />

        <label for="phone">Phone Number</label><br />
        <input type="tel" id="phone" name="phone" />

        <label for="password">Password</label><br />
        <input type="password" id="password" name="password" />

        <label for="confirm_password">Confirm Password</label><br />
        <input
            type="password"
            id="confirm_password"
            name="Confirm_Password"
        />

        <a href="home/home.html" class="button">Sign Up</a>

        <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
    </div>
    <div class="image-container">
        <img src="assets/images/signup_illustration.png" alt="Sign Up Image" />
    </div>
    </div>
    <footer>
        <p>&copy; 
            <script>document.write(new Date().getFullYear());</script> 
            Thought Roam. All rights reserved.</p>
    </footer>
</body>
</html>
