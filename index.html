<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js"></script>
</head>
<body>
    <header>
        <nav>
            <ul class="nav-list">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
                <li><a href="create-blog/create.html">Create Blog</a></li>
            </ul>
            <a href="profile.html" class="header-profile">
                <div class="header-avatar"></div>
            </a>
        </nav>
    </header>
    <div class="split-container">
    <div class="form-container">
        <form>
        <label for="name">Username</label><br />
        <input type="text" id="name" name="name" />

        <label for="email">Email</label><br />
        <input type="email" id="email" name="email" />

        <label for="password">Password</label><br />
        <input type="password" id="password" name="password" />

        <label for="confirm_password">Confirm Password</label><br />
        <input
            type="password"
            id="confirm_password"
            name="Confirm_Password"
        />

        <a href="profile.html" class="button">Sign Up</a>

        <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
    </div>
    <div class="image-container">
        <img src="assets/images/signupimg.jpg" alt="Sign Up Image" />
    </div>
    </div>
    <footer>
        <p>&copy; 2026 Blog. All rights reserved.</p>
    </footer>
</body>
</html>
