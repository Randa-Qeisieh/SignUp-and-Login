<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Blog</title>
    <link rel="icon" type="image/png" href="../assets/images/thoughtroam_icon_dark.png"/>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../styles.css"/>
    <link rel="stylesheet" href="../single-blog/single-blog-styles.css">
    <script src="../script.js"></script>
    <script src="../auth.js"></script>
    <script src="../home/home-script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header>
        <nav>
            <a href="../home/home.html" class="logo">
                <div class="logo-avatar">
                    <img src="../assets/images/thoughtroam_icon_dark.png" alt="Blog Logo" class="header-logo"/>
                </div>
            </a>
            <ul class="nav-list">
                <li><a href="../home/home.html" class="active">Home</a></li>
                <li><a href="../contactus.html">Contact Us</a></li>
                <li><a href="../create-blog/create.html">Create Blog</a></li>
                <li><a href="./dashboard/dashboard.html">Dashboard</a></li>
            </ul>
            <a href="../profile.html" class="header-profile">
                <div class="header-avatar"></div>
            </a>
        </nav>
    </header>
    <main> 
        <div id="single-blog-content"></div>
        <div class="blog-interactions">
            <div class="blog-likes">
                <button id="like-button" class="like-button"><i class="fa-regular fa-heart"></i> Like</button>
                <span id="like-count" class="like-count">0 Likes</span>
            </div>
        <div class="comments-section">
            <h3 class="comments-title">
                <i class="fa-solid fa-comments"></i> Comments
            </h3>
            <div id="comments-list"></div>
            <form id="comment-form" class="comment-form">
                <textarea id="comment-input" placeholder="Add a comment..." required></textarea>
                <button type="submit">Post Comment</button>
            </form>
            </div>
        </div>
        <div class="back-btn-wrapper">
            <button onclick="history.back()" class="back-button">← Back to Blogs</button>
        </div>
    </main>
    <footer>
        <p>&copy; 
            <script>document.write(new Date().getFullYear());</script> 
            Thought Roam. All rights reserved.</p>
    </footer>
</body>
</html>
